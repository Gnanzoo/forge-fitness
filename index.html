<title>Programme Fitness</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:#f8f8f6;color:#1a1a18;font-size:15px}
.wrap{max-width:780px;margin:0 auto;padding:1.25rem 1rem 5rem}
.app-title{font-size:20px;font-weight:700;margin-bottom:2px}
.app-sub{font-size:13px;color:#6b6b66;margin-bottom:1.25rem}
.nav-tabs{display:flex;border-bottom:1px solid #e0dfd7;margin-bottom:1.25rem;gap:0;overflow-x:auto}
.nav-tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;color:#6b6b66;border-bottom:2.5px solid transparent;margin-bottom:-1px;background:none;border-left:none;border-right:none;border-top:none;white-space:nowrap}
.nav-tab.on{color:#1a1a18;border-bottom-color:#1a1a18}
.nav-tab:hover{color:#1a1a18}
.main-view{display:none}.main-view.on{display:block}
.day-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.dtab{padding:6px 12px;border-radius:8px;border:1px solid #d0cfc7;font-size:13px;cursor:pointer;background:#fff;color:#6b6b66;transition:all .15s;white-space:nowrap}
.dtab:hover{background:#f0efe8}
.day-panel{display:none}.day-panel.visible{display:block}
.day-hdr{display:flex;align-items:center;gap:8px;margin-bottom:0.85rem;flex-wrap:wrap}
.day-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.prog-wrap{background:#eeeee8;border-radius:20px;height:6px;flex:1;min-width:40px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;transition:width .35s}
.pct{font-size:12px;color:#6b6b66;min-width:28px;text-align:right}
.stats-row{display:flex;gap:7px;margin-bottom:0.9rem;align-items:stretch;flex-wrap:wrap}
.scard{flex:1;min-width:80px;background:#f0efe8;border-radius:9px;padding:0.5rem 0.7rem}
.scard-lbl{font-size:11px;color:#6b6b66}
.scard-val{font-size:16px;font-weight:700;color:#1a1a18}
.btn-reset{font-size:12px;color:#6b6b66;background:none;border:1px solid #d0cfc7;border-radius:8px;padding:4px 9px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-reset:hover{background:#f0efe8}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin:1rem 0 0.4rem}
.ex-card{background:#fff;border:1px solid #e0dfd7;border-radius:12px;margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.ex-card.done .ex-name{text-decoration:line-through;opacity:.4}
.ex-main{display:flex;align-items:center;gap:9px;padding:0.6rem 0.8rem;cursor:pointer;user-select:none}
.ex-main:hover{background:#fafaf7}
.cb{width:20px;height:20px;border-radius:6px;border:1.5px solid #c0c0b8;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb.checked{border-color:transparent}
.cb svg{display:none}.cb.checked svg{display:block}
.ex-num{font-size:12px;color:#a8a8a0;min-width:16px;text-align:center;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:600;color:#1a1a18}
.ex-detail{font-size:12px;color:#6b6b66;margin-top:1px}
.opts-btn{font-size:11px;color:#6b6b66;padding:3px 7px;border:1px solid #d0cfc7;border-radius:7px;background:#f8f8f6;cursor:pointer;white-space:nowrap;flex-shrink:0}
.opts-btn:hover{border-color:#a0a09a}
.drawer{display:none;padding:0.65rem 0.8rem;border-top:1px solid #eeede8;background:#fafaf7}
.drawer.open{display:block}
.dtabs{display:flex;gap:4px;margin-bottom:0.6rem}
.itab{font-size:12px;padding:3px 9px;border-radius:7px;border:1px solid #d0cfc7;background:#fff;color:#6b6b66;cursor:pointer}
.itab.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.dp{display:none}.dp.on{display:block}
.vi{display:flex;align-items:flex-start;gap:9px;padding:6px 7px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:3px}
.vi:hover{background:#fff}
.vi.sel{background:#e1f5ee;border-color:#9fe1cb}
.vr{width:13px;height:13px;border-radius:50%;border:1.5px solid #b0b0a8;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center}
.vr.sel{background:#0f6e56;border-color:#0f6e56}
.vr.sel::after{content:'';width:5px;height:5px;border-radius:50%;background:#fff}
.vname{font-size:13px;font-weight:600;color:#1a1a18}
.vtip{font-size:11px;color:#6b6b66;margin-top:1px}
.vtag{display:inline-block;font-size:10px;background:#e1f5ee;color:#0f6e56;border-radius:10px;padding:1px 6px;margin-left:5px;font-weight:600}
.rst-var{font-size:11px;color:#6b6b66;background:none;border:1px solid #d0cfc7;border-radius:7px;padding:3px 8px;cursor:pointer;margin-top:5px}
.sets-hdr{display:grid;grid-template-columns:24px minmax(0,1fr) minmax(0,1fr) 20px;gap:4px 7px;margin-bottom:4px}
.sets-hdr span{font-size:11px;color:#6b6b66;font-weight:600}
.sets-body{display:grid;grid-template-columns:24px minmax(0,1fr) minmax(0,1fr) 20px;gap:4px 7px;align-items:center}
.sets-body input{width:100%;border:1px solid #d0cfc7;border-radius:7px;padding:3px 6px;font-size:13px;background:#fff;color:#1a1a18;height:28px;min-width:0}
.sets-body input:focus{outline:none;border-color:#0f6e56}
.set-num{font-size:12px;color:#6b6b66;text-align:center}
.del-btn{font-size:13px;color:#c0c0b8;background:none;border:none;cursor:pointer;padding:2px}
.del-btn:hover{color:#e24b4a}
.add-set{font-size:12px;color:#6b6b66;border:1px dashed #c8c8c0;border-radius:7px;padding:4px 10px;background:none;cursor:pointer;width:100%;margin-top:5px}
.add-set:hover{background:#fff}
.save-btn{font-size:12px;color:#fff;border:none;border-radius:8px;padding:5px 12px;background:#0f6e56;cursor:pointer;margin-top:5px;width:100%;font-weight:700}
.save-btn:hover{background:#085041}
/* TIME CONTROLS */
.time-ctrl{display:flex;align-items:center;gap:10px;padding:6px 0}
.tb{width:30px;height:30px;border-radius:8px;border:1px solid #d0cfc7;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.tb:hover{background:#f0efe8}
.tv{font-size:22px;font-weight:700;color:#1a1a18;min-width:56px;text-align:center}
.tu{font-size:12px;color:#6b6b66}
.time-steps{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.ts-btn{font-size:11px;padding:3px 7px;border-radius:7px;border:1px solid #d0cfc7;background:#fff;color:#6b6b66;cursor:pointer}
.ts-btn:hover{background:#f0efe8}
/* TIMER */
.timer-wrap{background:#fff;border:1px solid #e0dfd7;border-radius:10px;padding:10px 12px;margin-top:8px}
.timer-display{font-size:32px;font-weight:700;text-align:center;letter-spacing:2px;font-variant-numeric:tabular-nums;color:#1a1a18;margin-bottom:8px}
.timer-display.running{color:#0f6e56}
.timer-display.done{color:#e24b4a}
.timer-btns{display:flex;gap:6px}
.timer-btn{flex:1;padding:7px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.timer-btn.start{background:#0f6e56;color:#fff}
.timer-btn.start:hover{background:#085041}
.timer-btn.pause{background:#ba7517;color:#fff}
.timer-btn.pause:hover{background:#8a5510}
.timer-btn.reset-t{background:#f0efe8;color:#1a1a18;border:1px solid #d0cfc7}
.timer-btn.reset-t:hover{background:#e0dfd7}
.timer-progress{height:4px;background:#eeeee8;border-radius:4px;margin-bottom:8px;overflow:hidden}
.timer-progress-bar{height:100%;background:#0f6e56;border-radius:4px;transition:width .5s linear}
/* NOTE */
.note{width:100%;border:1px solid #d0cfc7;border-radius:8px;padding:7px 10px;font-size:13px;background:#fff;color:#1a1a18;resize:vertical;min-height:60px;font-family:inherit}
.note:focus{outline:none;border-color:#0f6e56}
/* BANNER */
.banner{background:#e1f5ee;border:1px solid #9fe1cb;border-radius:12px;padding:10px 14px;margin-bottom:1rem;display:none;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.banner p{font-size:13px;color:#0f6e56;font-weight:700}
.banner span{font-size:12px;color:#0f6e56}
/* DRAFT INDICATOR */
.draft-indicator{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#6b6b66;padding:3px 8px;background:#f0efe8;border-radius:20px}
.draft-dot{width:6px;height:6px;border-radius:50%;background:#ba7517}
.draft-dot.saved{background:#0f6e56}
/* REST DAY */
.rest-box{text-align:center;padding:2.5rem 1rem}
.rest-box .ico{font-size:36px;margin-bottom:0.5rem}
.rest-box h2{font-size:17px;font-weight:700;color:#1a1a18;margin-bottom:0.4rem}
.rest-box p{font-size:14px;color:#6b6b66;line-height:1.6}
/* WEEK DASHBOARD */
.wk-dashboard{background:#fff;border:1px solid #e0dfd7;border-radius:14px;padding:12px 14px;margin-bottom:1rem}
.wk-day-pills{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.wk-day-pill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px;white-space:nowrap}
.wk-stats{display:flex;gap:8px;flex-wrap:wrap}
.wk-stat{flex:1;min-width:70px;background:#f0efe8;border-radius:8px;padding:6px 10px}
.wk-stat-lbl{font-size:10px;color:#6b6b66}
.wk-stat-val{font-size:17px;font-weight:700;color:#1a1a18}
/* SUIVI */
.mgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:0.85rem}
.mc{background:#f0efe8;border-radius:9px;padding:0.6rem 0.75rem}
.mc-lbl{font-size:11px;color:#6b6b66}
.mc-val{font-size:18px;font-weight:700;color:#1a1a18}
.mc-sub{font-size:11px;color:#0f6e56;margin-top:1px}
.mc-sub.dn{color:#e24b4a}
.ex-sel{width:100%;border:1px solid #d0cfc7;border-radius:8px;padding:6px 8px;font-size:13px;background:#fff;color:#1a1a18;margin-bottom:0.8rem;height:34px}
.ex-sel:focus{outline:none;border-color:#0f6e56}
.period-btns{display:flex;gap:5px;margin-bottom:0.8rem}
.pb{font-size:12px;padding:4px 10px;border-radius:7px;border:1px solid #d0cfc7;background:#fff;color:#6b6b66;cursor:pointer}
.pb.on{background:#1a1a18;color:#fff;border-color:#1a1a18}
.chart-wrap{position:relative;width:100%;height:230px;margin-bottom:0.6rem}
.legend-row{display:flex;gap:14px;font-size:12px;color:#6b6b66;margin-bottom:0.7rem;flex-wrap:wrap}
.ldot{width:10px;height:3px;display:inline-block;border-radius:2px;margin-right:4px;vertical-align:middle}
.htable{width:100%;border-collapse:collapse;font-size:13px}
.htable th{text-align:left;font-size:11px;font-weight:700;color:#6b6b66;padding:5px 7px;border-bottom:1px solid #e0dfd7}
.htable td{padding:6px 7px;border-bottom:1px solid #eeede8;color:#1a1a18}
.htable tr:last-child td{border-bottom:none}
.trend-up{color:#0f6e56;font-size:11px;font-weight:600}
.trend-dn{color:#e24b4a;font-size:11px;font-weight:600}
.no-data{text-align:center;padding:2rem;color:#6b6b66;font-size:13px;line-height:1.6}
.wk-list{margin-top:1rem}
.wk-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:9px;background:#f0efe8;margin-bottom:5px}
.wk-item-label{font-size:13px;font-weight:700;color:#1a1a18}
.wk-item-sub{font-size:11px;color:#6b6b66}
/* MES SÉANCES */
.jour-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.jf-btn{padding:6px 12px;border-radius:20px;border:1px solid #d0cfc7;font-size:13px;cursor:pointer;background:#fff;color:#6b6b66;transition:all .15s;white-space:nowrap}
.jf-btn:hover{background:#f0efe8}
.seance-card{background:#fff;border:1px solid #e0dfd7;border-radius:14px;margin-bottom:12px;overflow:hidden}
.seance-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
.seance-hdr:hover{background:#fafaf7}
.seance-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.seance-title-block{flex:1;min-width:0}
.seance-title{font-size:14px;font-weight:700;color:#1a1a18}
.seance-meta{font-size:12px;color:#6b6b66;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seance-stats{display:flex;gap:10px;flex-shrink:0}
.seance-stat{text-align:right}
.seance-stat-val{font-size:13px;font-weight:700;color:#1a1a18}
.seance-stat-lbl{font-size:10px;color:#6b6b66}
.seance-chevron{font-size:11px;color:#b0b0a8;flex-shrink:0;transition:transform .2s}
.seance-chevron.open{transform:rotate(90deg)}
.seance-body{display:none;border-top:1px solid #eeede8}
.seance-body.open{display:block}
.seance-ex-list{padding:8px 14px 12px}
.seance-ex-row{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f0efe8}
.seance-ex-row:last-child{border-bottom:none}
.seance-ex-name{font-size:13px;font-weight:600;color:#1a1a18;min-width:130px;flex-shrink:0}
.seance-ex-sets{flex:1;min-width:0}
.seance-set-pill{display:inline-block;font-size:11px;background:#f0efe8;border-radius:6px;padding:2px 7px;margin:2px 3px 2px 0;color:#1a1a18}
.seance-ex-note{font-size:11px;color:#6b6b66;font-style:italic;margin-top:3px}
.cmp-block{background:#f8f8f6;border-top:1px solid #eeede8;padding:10px 14px 12px}
.cmp-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:8px}
.cmp-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap}
.cmp-ex{font-size:12px;font-weight:600;color:#1a1a18;min-width:120px;flex-shrink:0}
.cmp-prev{font-size:11px;color:#6b6b66;flex:1;min-width:60px}
.cmp-curr{font-size:11px;font-weight:600;color:#1a1a18;flex:1;min-width:60px}
.cmp-delta{font-size:11px;font-weight:700;min-width:48px;text-align:right}
.cmp-up{color:#0f6e56}.cmp-dn{color:#e24b4a}.cmp-eq{color:#888}
.cmp-new{font-size:10px;background:#e1f5ee;color:#0f6e56;border-radius:6px;padding:1px 6px;font-weight:700}
.cmp-none{font-size:12px;color:#a0a09a;padding:4px 0;font-style:italic}
.seance-empty{text-align:center;padding:2.5rem 1rem;color:#6b6b66;font-size:13px;line-height:1.7}
/* PARAMÈTRES */
.params-day-block{margin-bottom:1.25rem}
.params-day-title{display:flex;align-items:center;gap:8px;margin-bottom:0.5rem}
.params-day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.params-ex-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border:1px solid #e0dfd7;border-radius:10px;margin-bottom:5px;flex-wrap:wrap}
.params-ex-name{font-size:13px;font-weight:600;color:#1a1a18}
.params-ex-detail{font-size:11px;color:#6b6b66;margin-top:1px}
.params-series-ctrl{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.ps-btn{width:28px;height:28px;border-radius:7px;border:1px solid #d0cfc7;background:#f0efe8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:700}
.ps-btn:hover{background:#e0dfd7}
.ps-val{font-size:15px;font-weight:700;color:#1a1a18;min-width:22px;text-align:center}
.ps-lbl{font-size:11px;color:#6b6b66}
.ps-modified{font-size:10px;color:#0f6e56;background:#e1f5ee;border-radius:6px;padding:1px 5px;font-weight:700}
.params-reset-btn{font-size:11px;color:#6b6b66;background:none;border:1px solid #d0cfc7;border-radius:7px;padding:2px 7px;cursor:pointer}
.params-reset-btn:hover{background:#f0efe8}
.export-section{background:#fff;border:1px solid #e0dfd7;border-radius:12px;padding:14px;margin-bottom:1.25rem}
.export-section h3{font-size:14px;font-weight:700;color:#1a1a18;margin-bottom:4px}
.export-section p{font-size:12px;color:#6b6b66;margin-bottom:10px;line-height:1.5}
.export-btn{font-size:13px;font-weight:600;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;margin-right:8px;margin-bottom:6px}
.export-btn.green{background:#0f6e56;color:#fff}
.export-btn.green:hover{background:#085041}
.export-btn.outline{background:none;border:1px solid #d0cfc7;color:#1a1a18}
.export-btn.outline:hover{background:#f0efe8}
.import-area{width:100%;border:1px dashed #c8c8c0;border-radius:8px;padding:8px;font-size:12px;background:#fafaf7;color:#1a1a18;min-height:60px;font-family:monospace;resize:vertical}
.import-area:focus{outline:none;border-color:#0f6e56}
/* FIXED BOTTOM BTN */
.fixed-save-wrap{position:fixed;bottom:0;left:0;right:0;padding:10px 1rem 14px;background:linear-gradient(to top,#f8f8f6 60%,rgba(248,248,246,0));pointer-events:none;z-index:200}
.fixed-save-btn{pointer-events:all;width:100%;max-width:780px;margin:0 auto;display:block;background:#0f6e56;color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
.fixed-save-btn:hover{background:#085041}
/* ═══════════════════════════════════════════
   MOBILE OPTIMISATION — max-width 480px
   ═══════════════════════════════════════════ */
@media (max-width: 480px) {
  /* Base */
  body{font-size:14px}
  .wrap{padding:0.75rem 0.6rem 5rem}

  /* Navigation — icônes + texte court */
  .nav-tabs{margin-bottom:0.85rem;overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* Variantes */
  .vname{font-size:12px}

  /* Grille séries — 3 colonnes sur mobile */
  .sets-hdr{grid-template-columns:22px minmax(0,1fr) minmax(0,1fr) 18px;gap:3px 5px}

  .sets-body{grid-template-columns:22px minmax(0,1fr) minmax(0,1fr) 18px;gap:3px 5px}
  .sets-body input{font-size:13px;height:36px;padding:4px 5px}
  .set-num{font-size:11px}
  .add-set{font-size:11px;padding:6px 8px;margin-top:4px}

  /* Contrôles temps */
  .time-ctrl{gap:8px;padding:4px 0}

  /* Timer */
  .timer-wrap{padding:8px 10px;margin-top:6px}
  .timer-display{font-size:28px;margin-bottom:6px}

  /* Week dashboard */
  .wk-dashboard{padding:10px 11px;margin-bottom:0.75rem}
  .wk-day-pills{gap:3px;margin-bottom:8px}
  .wk-day-pill{font-size:10px;padding:3px 7px}
  .wk-stats{gap:5px}
  .wk-stat{padding:5px 7px;min-width:60px}
  .wk-stat-lbl{font-size:9px}
  .wk-stat-val{font-size:14px}

  /* Métriques globales */
  .mgrid{gap:5px;margin-bottom:0.65rem}
  .mc{padding:0.5rem 0.6rem}
  .mc-lbl{font-size:10px}
  .mc-val{font-size:16px}
  .mc-sub{font-size:10px}

  /* Suivi */
  .ex-sel{font-size:13px;height:38px;margin-bottom:0.65rem}
  .period-btns{gap:4px;margin-bottom:0.65rem}
  .pb{font-size:11px;padding:5px 9px}
  .chart-wrap{height:190px;margin-bottom:0.5rem}
  .legend-row{font-size:11px;gap:10px}
  .htable{font-size:12px}
  .htable th{font-size:10px;padding:4px 5px}
  .htable td{padding:5px 5px}

  /* Mes séances */
  .jour-filter{gap:4px;margin-bottom:0.75rem}
  .jf-btn{padding:5px 9px;font-size:12px}
  .seance-card{border-radius:11px;margin-bottom:9px}
  .seance-hdr{padding:8px 11px;gap:7px}
  .seance-title{font-size:13px}
  .seance-meta{font-size:11px}
  .seance-stat-val{font-size:12px}
  .seance-stat-lbl{font-size:9px}
  .seance-stats{gap:7px}
  .seance-ex-list{padding:6px 11px 10px}
  .seance-ex-row{gap:7px;padding:6px 0}
  .seance-ex-name{font-size:12px;min-width:110px}
  .seance-set-pill{font-size:10px;padding:2px 5px}
  /* Comparaison — empilée verticalement sur mobile */
  .cmp-block{padding:8px 11px 10px}
  .cmp-title{font-size:9px;margin-bottom:6px}
  .cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f0efe8}
  .cmp-ex{grid-column:1/-1;font-size:12px;font-weight:700;margin-bottom:2px}

  .ps-lbl{font-size:10px}
  .export-section{padding:11px}

  /* Bouton fixe bas */

  /* Samedi rattrappage */

  /* Dimanche */

  /* Bannière */

}

/* Très petits écrans (SE, Android compact) */
@media (max-width: 360px) {
  .nav-tab{padding:7px 8px;font-size:11px}
  .dtab{padding:4px 7px;font-size:11px}
  .wk-day-pill{font-size:9px;padding:2px 5px}

<body>
<div class="wrap">
  <div class="app-title">Programme Fitness</div>
  <div class="app-sub">5 séances · 45–60 min · 8–15 reps · Repos 60–90 s</div>
  <div class="nav-tabs">
    <button class="nav-tab on" onclick="showMain('seance',this)">Séance du jour</button>
    <button class="nav-tab" onclick="showMain('seances-hist',this)">Mes séances</button>
    <button class="nav-tab" onclick="showMain('suivi',this)">Suivi</button>
    <button class="nav-tab" onclick="showMain('params',this)">Paramètres</button>
  </div>

  <div id="main-seance" class="main-view on">
    <div id="week-banner" class="banner">
      <p id="banner-msg">&#10003; Semaine enregistrée !</p>
      <span id="banner-date"></span>
    </div>
    <!-- WEEK DASHBOARD -->
    <div class="wk-dashboard" id="wk-dashboard">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888">Semaine en cours</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="draft-indicator" id="draft-indicator"><span class="draft-dot" id="draft-dot"></span><span id="draft-label">brouillon</span></div>
          <span style="font-size:11px;color:#6b6b66" id="wkd-period"></span>
        </div>
      </div>
      <div class="wk-day-pills" id="wkd-days"></div>
      <div class="wk-stats">
        <div class="wk-stat"><div class="wk-stat-lbl">Séances</div><div class="wk-stat-val" id="wkd-done">0/5</div></div>
        <div class="wk-stat"><div class="wk-stat-lbl">Volume</div><div class="wk-stat-val" id="wkd-vol">0 kg</div></div>
        <div class="wk-stat"><div class="wk-stat-lbl">Meilleur lift</div><div class="wk-stat-val" id="wkd-top">—</div></div>
        <div class="wk-stat" id="wkd-vs-card" style="background:#e1f5ee"><div class="wk-stat-lbl" style="color:#0f6e56">vs S. préc.</div><div class="wk-stat-val" style="color:#0f6e56" id="wkd-vs">—</div></div>
      </div>
    </div>
    <div class="day-tabs" id="day-tabs-bar"></div>
    <div id="days-container"></div>
  </div>

  <div id="main-seances-hist" class="main-view">
    <div class="jour-filter" id="jour-filter"></div>
    <div id="seances-list"></div>
  </div>

  <div id="main-suivi" class="main-view">
    <div class="mgrid">
      <div class="mc"><div class="mc-lbl">Semaines enreg.</div><div class="mc-val" id="m-weeks">0</div></div>
      <div class="mc"><div class="mc-lbl">Volume total (kg)</div><div class="mc-val" id="m-vol">0</div></div>
      <div class="mc"><div class="mc-lbl">Record charge</div><div class="mc-val" id="m-max">0 kg</div></div>
    </div>
    <select class="ex-sel" id="ex-sel" onchange="renderSuivi()"><option value="">-- Choisir un exercice --</option></select>
    <div class="period-btns">
      <button class="pb on" onclick="setPeriod('mois',this)">Mois</button>
      <button class="pb" onclick="setPeriod('trimestre',this)">3 mois</button>
      <button class="pb" onclick="setPeriod('tout',this)">Tout</button>
    </div>
    <div id="suivi-metrics" class="mgrid" style="display:none">
      <div class="mc"><div class="mc-lbl">Charge max</div><div class="mc-val" id="s-max">—</div><div class="mc-sub" id="s-max-tr"></div></div>
      <div class="mc"><div class="mc-lbl">Volume</div><div class="mc-val" id="s-vol">—</div><div class="mc-sub" id="s-vol-tr"></div></div>
      <div class="mc"><div class="mc-lbl">Séries</div><div class="mc-val" id="s-sets">—</div></div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="legend-row" id="chart-legend"></div>
    <div id="history-div"></div>
    <div class="wk-list" id="week-list-div"></div>
  </div>

  <div id="main-params" class="main-view">
    <div id="params-container"></div>
  </div>
</div>

<!-- FIXED SAVE BUTTON -->
<div class="fixed-save-wrap" id="fixed-save-wrap">
  <button class="fixed-save-btn" onclick="saveWeek()">&#128190; Enregistrer la semaine</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STORE — toutes les initialisations AVANT tout le reste
// ═══════════════════════════════════════════════════════════════════
const SK='fit_v6';
function ldStore(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){return{}}}
function svStore(){
  ST._savedAt=Date.now();
  try{localStorage.setItem(SK,JSON.stringify(ST))}catch(e){console.warn('localStorage full',e);}
}
let ST=ldStore();
// Garantir toutes les clés dès le départ
if(!ST.history)  ST.history=[];
if(!ST.weeks)    ST.weeks=[];
if(!ST.sessions) ST.sessions=[];
if(!ST.customDs) ST.customDs={};   // ← initialisé ICI, avant tout appel

function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'\\"')}
function wkKey(d){
  const dt=new Date(d),dy=dt.getDay(),diff=dt.getDate()-dy+(dy===0?-6:1);
  const m=new Date(dt);m.setDate(diff);
  return m.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtN(n){return Math.round(n).toLocaleString('fr-FR')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function getDs(ex){
  return(ST.customDs&&ST.customDs[ex.id]!==undefined)?ST.customDs[ex.id]:ex.ds;
}
function liveSeries(dk){
  return(DAYS[dk]||{exercises:[]}).exercises.reduce((a,e,i)=>{
    const k=`${dk}-${i}`;
    return a+(SES.seriesCounts[k]!==undefined?SES.seriesCounts[k]:getDs(e));
  },0);
}
function fmtTime(sec){
  const m=Math.floor(sec/60),s=sec%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

// AUTO-SAVE DRAFT
// ═══════════════════════════════════════════════════════════════════
let draftSaveTimer=null;
function scheduleDraftSave(){
  if(draftSaveTimer)clearTimeout(draftSaveTimer);
  draftSaveTimer=setTimeout(()=>{
    saveDraftNow();
    showDraftSaved();
  },800);
}
function saveDraftNow(){
  if(!ST.draft)ST.draft={};
  Object.keys(DAYS).forEach(dk=>{
    const noteEl=document.getElementById(`seance-note-${dk}`);
    const note=noteEl?noteEl.value:'';
    const exercises={};
    DAYS[dk].exercises.forEach((ex,idx)=>{
      const key=`${dk}-${idx}`;
      if(ex.type==='time'){
        if(SES.timeVals[key]!==undefined)exercises[ex.id]={timeVal:SES.timeVals[key]};
      } else {
        const body=document.getElementById(`sb-${dk}-${idx}`);
        if(body){
          const kgs=[...body.querySelectorAll('input[data-t="kg"]')];
          const rps=[...body.querySelectorAll('input[data-t="reps"]')];
          if(kgs.length){
            const sets=kgs.map((el,i)=>({kg:parseFloat(el.value)||0,reps:parseInt(rps[i]?.value)||0}));
            if(sets.some(s=>s.kg>0||s.reps>0))exercises[ex.id]={sets};
          }
        }
      }
    });
    ST.draft[dk]={note,exercises};
  });
  svStore();
}
function showDraftSaved(){
  const dot=document.getElementById('draft-dot');
  const lbl=document.getElementById('draft-label');
  if(dot)dot.classList.add('saved');
  if(lbl)lbl.textContent='brouillon sauvegardé';
}
function showDraftUnsaved(){
  const dot=document.getElementById('draft-dot');
  const lbl=document.getElementById('draft-label');
  if(dot)dot.classList.remove('saved');
  if(lbl)lbl.textContent='non sauvegardé';
}

function buildAll(){
  const bar=document.getElementById('day-tabs-bar'),cont=document.getElementById('days-container');
  bar.innerHTML='';cont.innerHTML='';
  const keys=['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
  const labels=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const colors=['#e24b4a','#639922','#378add','#ba7517','#7f77dd','#888780','#444441'];
  keys.forEach((dk,ti)=>{
    const btn=document.createElement('button');
    btn.className='dtab';btn.textContent=labels[ti];
    btn.dataset.dk=dk;
    btn.onclick=()=>showDay(dk,btn,colors[ti]);
    bar.appendChild(btn);
    const panel=document.createElement('div');
    panel.className='day-panel';panel.id='day-'+dk;
    if(DAYS[dk])panel.innerHTML=buildDay(dk);
    else if(dk==='samedi')panel.innerHTML=buildSamedi();
    else panel.innerHTML=buildDimanche();
    cont.appendChild(panel);
  });
}

function buildDay(dk){
  const d=DAYS[dk],ds=d.exercises.reduce((a,e)=>a+getDs(e),0);
  let h=`<div class="day-hdr">
    <span class="day-badge" style="background:${d.color}">${d.label}</span>
    <div class="prog-wrap"><div class="prog-bar" id="prog-${dk}" style="background:${d.color};width:0%"></div></div>
    <span class="pct" id="pct-${dk}">0%</span>
    <button class="btn-reset" onclick="resetDay('${dk}')">Réinitialiser</button>
  </div>
  <div class="stats-row">
    <div class="scard"><div class="scard-lbl">Complétés</div><div class="scard-val" id="done-${dk}">0/${d.exercises.length}</div></div>
    <div class="scard"><div class="scard-lbl">Total séries</div><div class="scard-val" id="tseries-${dk}">${ds}</div></div>
  </div>
  <textarea class="note" id="seance-note-${dk}" placeholder="Note de séance : énergie, sensations, douleurs..." style="min-height:45px;margin-bottom:0.85rem" oninput="showDraftUnsaved();scheduleDraftSave()"></textarea>`;
  const main=d.exercises.filter(e=>!e.fin),fin=d.exercises.filter(e=>e.fin);
  if(main.length)h+='<div class="sec-title">Exercices principaux</div>'+main.map(ex=>buildEx(dk,ex,d.exercises.indexOf(ex),d.color)).join('');
  if(fin.length)h+='<div class="sec-title">Finisher / Cardio</div>'+fin.map(ex=>buildEx(dk,ex,d.exercises.indexOf(ex),d.color,true)).join('');
  return h;
}

// Catchup exercises added dynamically on Saturday
const catchupExes=[];
let catchupCounter=0;
function addCatchupEx(){
  const sel=document.getElementById('sam-ex-selector');
  if(!sel||!sel.value)return;
  const exId=sel.value;
  const exName=sel.options[sel.selectedIndex].dataset.name;
  // Prevent adding the same exercise twice
  if(catchupExes.find(e=>e.id===exId)){
    sel.value='';return;
  }
  // Find full exercise data
  let fullEx=null;
  Object.values(DAYS).forEach(day=>{day.exercises.forEach(e=>{if(e.id===exId)fullEx=e;});});
  if(!fullEx)return;
  catchupExes.push({id:exId,name:exName});
  const cIdx=catchupCounter++;
  const list=document.getElementById('sam-catchup-list');
  const dk='samedi';
  const div=document.createElement('div');
  div.id=`catchup-${cIdx}`;
  div.style.cssText='margin-bottom:8px;background:#fff;border:1px solid #e0dfd7;border-radius:12px;overflow:hidden';
  div.innerHTML=`<div style="display:flex;align-items:center;gap:9px;padding:0.6rem 0.8rem;background:#fafaf7;border-bottom:1px solid #eeede8">
    <div style="flex:1">
      <div style="font-size:14px;font-weight:600;color:#1a1a18">${exName}</div>
      <div style="font-size:12px;color:#6b6b66">${fullEx.detail}</div>
    </div>
    <button onclick="removeCatchupEx('${exId}',${cIdx})" style="font-size:12px;color:#a0a09a;background:none;border:none;cursor:pointer;padding:2px 6px">✕</button>
  </div>
  <div style="padding:0.65rem 0.8rem;background:#fafaf7">
    ${fullEx.type==='time'?buildCatchupTimePanel(fullEx,cIdx):buildCatchupWeightPanel(fullEx,cIdx)}
  </div>`;
  list.appendChild(div);
  sel.value='';
}
function removeCatchupEx(exId,cIdx){
  const idx=catchupExes.findIndex(e=>e.id===exId);
  if(idx>=0)catchupExes.splice(idx,1);
  const div=document.getElementById(`catchup-${cIdx}`);
  if(div)div.remove();
}

function buildCatchupTimePanel(ex,cIdx){

const catchupTimes={};
function adjCatchupTime(cIdx,delta,unit){
  if(!catchupTimes[cIdx]){
    const el=document.getElementById(`cu-tv-${cIdx}`);
    catchupTimes[cIdx]=el?parseInt(el.textContent):5;
  }
  catchupTimes[cIdx]=Math.max(1,catchupTimes[cIdx]+delta);
  const el=document.getElementById(`cu-tv-${cIdx}`);if(el)el.textContent=catchupTimes[cIdx];
}
const catchupSetCt={};
function togCatchupBw(cIdx){
  const cb=document.getElementById(`bw-catchup-${cIdx}`);
  const hdr=document.getElementById(`cu-hdr-${cIdx}`);
  const body=document.getElementById(`cu-sb-${cIdx}`);
  const isBw=cb&&cb.checked;
  if(hdr)hdr.innerHTML=isBw?'<span>Série</span><span style="color:#0f6e56;font-size:11px">Poids corps</span><span>Reps</span><span></span>':'<span>Série</span><span>Charge (kg)</span><span>Reps</span><span></span>';
  if(body)[...body.querySelectorAll('input[data-t="kg"]')].forEach(inp=>{inp.disabled=isBw;inp.style.opacity=isBw?'0.4':'1';if(isBw)inp.value='';});
}
function addCatchupSet(cIdx){
  const body=document.getElementById(`cu-sb-${cIdx}`);if(!body)return;
  catchupSetCt[cIdx]=(catchupSetCt[cIdx]||0)+1;const n=catchupSetCt[cIdx];
  const isBw=document.getElementById(`bw-catchup-${cIdx}`)?.checked||false;
  const nl=document.createElement('div');nl.className='set-num';nl.textContent=n;
  const i1=document.createElement('input');i1.type='number';i1.placeholder=isBw?'—':'0';i1.min='0';i1.step='0.5';i1.dataset.t='kg';
  if(isBw){i1.disabled=true;i1.style.opacity='0.4';}
  const i2=document.createElement('input');i2.type='number';i2.placeholder='0';i2.min='0';i2.dataset.t='reps';
  const del=document.createElement('button');del.className='del-btn';del.innerHTML='&#10005;';
  del.onclick=()=>{nl.remove();i1.remove();i2.remove();del.remove();};
  body.appendChild(nl);body.appendChild(i1);body.appendChild(i2);body.appendChild(del);
}
function saveCatchupSets(exId,exName,cIdx){
  const body=document.getElementById(`cu-sb-${cIdx}`);if(!body)return;
  const isBw=document.getElementById(`bw-catchup-${cIdx}`)?.checked||false;
  const kgs=[...body.querySelectorAll('input[data-t="kg"]')],rps=[...body.querySelectorAll('input[data-t="reps"]')];
  const sets=kgs.map((el,i)=>({kg:isBw?0:(parseFloat(el.value)||0),reps:parseInt(rps[i]?.value)||0,bodyweight:isBw})).filter(s=>s.reps>0);
  if(!sets.length){alert("Ajoute au moins une série.");return;}
  const maxKg=isBw?0:Math.max(...sets.map(s=>s.kg)),totalVol=isBw?0:sets.reduce((a,s)=>a+s.kg*s.reps,0);
  const now=new Date(),dateStr=now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}),weekKey=wkKey(now);
  const seanceNote=document.getElementById('seance-note-samedi')?.value||'';
  ST.history.push({date:dateStr,ts:now.getTime(),week:weekKey,exId,exName,day:'samedi',type:'weight',sets,maxKg,totalVol,bodyweight:isBw});
  pushSessionEntry('samedi',{exId,exName,type:'weight',sets,maxKg,totalVol,bodyweight:isBw,variant:null,note:''},dateStr,now.getTime(),weekKey,seanceNote,'samedi','Samedi — Rattrappage','#888780');
  svStore();updSelEx();updGlobal();

// ═══════════════════════════════════════════════════════════════════
// TIMER LOGIC
// ═══════════════════════════════════════════════════════════════════
function getTimerTarget(dk,idx){
  const ex=DAYS[dk].exercises[idx];
  const val=SES.timeVals[`${dk}-${idx}`]!==undefined?SES.timeVals[`${dk}-${idx}`]:ex.dv;
  return ex.unit==='sec'?val:val*60;
}
function timerStart(dk,idx){
  const tKey=`${dk}-${idx}`;
  if(!TIMERS[tKey])TIMERS[tKey]={elapsed:0,running:false};
  const T=TIMERS[tKey];
  if(T.running){
    // pause
    clearInterval(T.interval);T.running=false;
    const btn=document.getElementById(`tbtn-start-${dk}-${idx}`);
    if(btn){btn.textContent='▶ Reprendre';btn.className='timer-btn start';}
    return;
  }
  T.running=true;
  const target=getTimerTarget(dk,idx);
  const btn=document.getElementById(`tbtn-start-${dk}-${idx}`);
  if(btn){btn.textContent='⏸ Pause';btn.className='timer-btn pause';}
  T.interval=setInterval(()=>{
    T.elapsed++;
    const remaining=Math.max(0,target-T.elapsed);
    const pct=Math.min(100,Math.round(T.elapsed/target*100));
    const disp=document.getElementById(`tdisplay-${dk}-${idx}`);
    const bar=document.getElementById(`tpb-${dk}-${idx}`);
    if(disp){disp.textContent=fmtTime(remaining);disp.className='timer-display'+(T.elapsed>=target?' done':' running');}
    if(bar)bar.style.width=pct+'%';
    if(T.elapsed>=target){
      clearInterval(T.interval);T.running=false;
      const b=document.getElementById(`tbtn-start-${dk}-${idx}`);
      if(b){b.textContent='✓ Terminé';b.className='timer-btn reset-t';}
      // Visual alert
      if(bar)bar.style.background='#e24b4a';
    }
  },1000);
}
function timerReset(dk,idx){
  const tKey=`${dk}-${idx}`;
  if(TIMERS[tKey]){clearInterval(TIMERS[tKey].interval);delete TIMERS[tKey];}
  const target=getTimerTarget(dk,idx);
  const disp=document.getElementById(`tdisplay-${dk}-${idx}`);
  const bar=document.getElementById(`tpb-${dk}-${idx}`);
  const btn=document.getElementById(`tbtn-start-${dk}-${idx}`);
  if(disp){disp.textContent=fmtTime(target);disp.className='timer-display';}
  if(bar){bar.style.width='0%';bar.style.background='#0f6e56';}
  if(btn){btn.textContent='▶ Démarrer';btn.className='timer-btn start';}
}

function addSet(dk,idx,exId,exName){
  const key=`${dk}-${idx}`;setRowCt[key]=(setRowCt[key]||0)+1;const n=setRowCt[key];
  const body=document.getElementById(`sb-${dk}-${idx}`);
  const isBw=document.getElementById(`bw-${dk}-${idx}`)?.checked||false;

  const i1=document.createElement('input');i1.type='number';i1.placeholder=isBw?'—':'0';i1.min='0';i1.step='0.5';i1.dataset.t='kg';
  if(isBw){i1.disabled=true;i1.style.opacity='0.4';}
  const i2=document.createElement('input');i2.type='number';i2.placeholder='0';i2.min='0';i2.dataset.t='reps';
  i1.oninput=i2.oninput=()=>{showDraftUnsaved();scheduleDraftSave();};
  const del=document.createElement('button');del.className='del-btn';del.innerHTML='&#10005;';
  del.onclick=()=>{
    nl.remove();i1.remove();i2.remove();del.remove();
    const exD=DAYS[dk]?DAYS[dk].exercises[idx]:null;
    if(exD)SES.seriesCounts[key]=Math.max(0,(SES.seriesCounts[key]!==undefined?SES.seriesCounts[key]:getDs(exD))-1);
    updSeriesTotal(dk);
  };
  body.appendChild(nl);body.appendChild(i1);body.appendChild(i2);body.appendChild(del);
  const exD=DAYS[dk]?DAYS[dk].exercises[idx]:null;
  if(exD)SES.seriesCounts[key]=(SES.seriesCounts[key]!==undefined?SES.seriesCounts[key]:getDs(exD))+1;
  updSeriesTotal(dk);

function saveSets(dk,idx,exId,exName){
  const body=document.getElementById(`sb-${dk}-${idx}`);
  const isBw=document.getElementById(`bw-${dk}-${idx}`)?.checked||false;
  const kgs=[...body.querySelectorAll('input[data-t="kg"]')];
  const rps=[...body.querySelectorAll('input[data-t="reps"]')];
  // Bodyweight: accept reps-only rows; with charge: require kg>0
  const sets=kgs.map((el,i)=>{
    const kg=isBw?0:(parseFloat(el.value)||0);
    const reps=parseInt(rps[i]?.value)||0;
    return {kg,reps,bodyweight:isBw};
  }).filter(s=>s.reps>0);
  if(!sets.length){alert("Ajoute au moins une série avant d'enregistrer.");return;}
  const maxKg=isBw?0:Math.max(...sets.map(s=>s.kg));
  const totalVol=isBw?0:sets.reduce((a,s)=>a+s.kg*s.reps,0);
  const now=new Date(),dateStr=now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}),weekKey=wkKey(now);
  const key=`${dk}-${idx}`,av=SES.activeVar[key],note=document.getElementById(`nt-${dk}-${idx}`)?.value||'';
  const seanceNote=document.getElementById(`seance-note-${dk}`)?.value||'';
  const dispName=av?av.name:exName;
  const entry={exId,exName:dispName,type:'weight',sets,maxKg,totalVol,bodyweight:isBw,variant:av?av.name:null,note};
  const prevIdx=ST.history.findIndex(h=>h.exId===exId&&h.date===dateStr&&h.type==='weight');
  if(prevIdx>=0)ST.history.splice(prevIdx,1);
  ST.history.push({date:dateStr,ts:now.getTime(),week:weekKey,exId,exName:dispName,day:dk,type:'weight',sets,maxKg,totalVol,bodyweight:isBw});
  pushSessionEntry(dk,entry,dateStr,now.getTime(),weekKey,seanceNote);
  svStore();SES.seriesCounts[key]=sets.length;updSeriesTotal(dk);
  const de=document.getElementById(`exd-${dk}-${idx}`);
  if(de)de.textContent=isBw?`Poids corps · ${sets.length} série(s) · ${sets.reduce((a,s)=>a+s.reps,0)} reps`:`${maxKg} kg max · ${sets.length} série(s)`;
  updSelEx();updGlobal();
  const btn=document.querySelector(`#dp-${dk}-${idx}-s .save-btn`);

}

// SESSION MANAGEMENT
// ═══════════════════════════════════════════════════════════════════
function pushSessionEntry(dk,entry,dateStr,ts,weekKey,seanceNote,forceDk,forceDayLabel,forceColor){
  const resolvedDk=forceDk||dk;
  const d=DAYS[resolvedDk]||{label:forceDayLabel||resolvedDk,color:forceColor||'#888780'};
  let sess=ST.sessions.find(s=>s.date===dateStr&&s.day===resolvedDk);
  if(!sess){
    sess={id:uid(),date:dateStr,ts,week:weekKey,day:resolvedDk,dayLabel:d.label,color:d.color||forceColor||'#888780',note:'',entries:[]};
    ST.sessions.push(sess);
  }
  if(seanceNote)sess.note=seanceNote;
  const ei=sess.entries.findIndex(e=>e.exId===entry.exId);
  if(ei>=0)sess.entries[ei]=entry;else sess.entries.push(entry);
}

function captureAllUnsaved(){
  const now=new Date();
  const dateStr=now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const weekKey=wkKey(now);
  let captured=0;
  Object.entries(DAYS).forEach(([dk,day])=>{
    const seanceNote=document.getElementById(`seance-note-${dk}`)?.value||'';
    day.exercises.forEach((ex,idx)=>{
      const key=`${dk}-${idx}`,av=SES.activeVar[key];
      const note=document.getElementById(`nt-${dk}-${idx}`)?.value||'';
      if(ex.type==='time'){
        const wasAdjusted=SES.timeVals[key]!==undefined;
        const drawerOpen=document.getElementById(`drw-${dk}-${idx}`)?.classList.contains('open');
        if(wasAdjusted||drawerOpen){
          const val=SES.timeVals[key]!==undefined?SES.timeVals[key]:ex.dv,unit=ex.unit||'min';
          const already=ST.history.find(h=>h.exId===ex.id&&h.date===dateStr&&h.type==='time');
          if(!already){
            ST.history.push({date:dateStr,ts:now.getTime(),week:weekKey,exId:ex.id,exName:av?av.name:ex.name,day:dk,type:'time',unit,value:val,sets:[],maxKg:0,totalVol:0});
            captured++;
          }
          pushSessionEntry(dk,{exId:ex.id,exName:av?av.name:ex.name,type:'time',unit,value:val,sets:[],maxKg:0,totalVol:0,variant:av?av.name:null,note},dateStr,now.getTime(),weekKey,seanceNote);
        }
      } else {
        const body=document.getElementById(`sb-${dk}-${idx}`);
        if(!body)return;
        const kgs=[...body.querySelectorAll('input[data-t="kg"]')],rps=[...body.querySelectorAll('input[data-t="reps"]')];
        if(!kgs.length)return;
        const sets=kgs.map((el,i)=>({kg:parseFloat(el.value)||0,reps:parseInt(rps[i]?.value)||0})).filter(s=>s.kg>0||s.reps>0);
        if(!sets.length)return;
        const maxKg=Math.max(...sets.map(s=>s.kg)),totalVol=sets.reduce((a,s)=>a+s.kg*s.reps,0);
        const prevIdx=ST.history.findIndex(h=>h.exId===ex.id&&h.date===dateStr&&h.type==='weight');
        if(prevIdx>=0)ST.history.splice(prevIdx,1);
        ST.history.push({date:dateStr,ts:now.getTime(),week:weekKey,exId:ex.id,exName:av?av.name:ex.name,day:dk,type:'weight',sets,maxKg,totalVol});
        pushSessionEntry(dk,{exId:ex.id,exName:av?av.name:ex.name,type:'weight',sets,maxKg,totalVol,variant:av?av.name:null,note},dateStr,now.getTime(),weekKey,seanceNote);
        const de=document.getElementById(`exd-${dk}-${idx}`);if(de)de.textContent=`${maxKg} kg max · ${sets.length} série(s)`;
        captured++;
      }
    });
  });
  return captured;
}

function saveWeek(){
  saveDraftNow();
  const captured=captureAllUnsaved();
  const now=new Date(),weekKey=wkKey(now),saved=now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  const recentH=ST.history.filter(h=>h.week===weekKey);
  const snap={weekKey,savedAt:saved,ts:now.getTime(),entries:recentH.length,totalVol:Math.round(recentH.reduce((a,h)=>a+h.totalVol,0))};
  const ei=ST.weeks.findIndex(s=>s.weekKey===weekKey);
  if(ei>=0)ST.weeks[ei]=snap;else ST.weeks.push(snap);
  // Clear draft for this week
  ST.draft={};
  svStore();
  // Reset all days
  Object.keys(DAYS).forEach(dk=>resetDay(dk,true));
  // Show banner
  const banner=document.getElementById('week-banner');
  const msg=document.getElementById('banner-msg');
  const dateEl=document.getElementById('banner-date');
  if(msg)msg.textContent=`✓ Semaine enregistrée${captured>0?' ('+captured+' exercice(s) capturé(s))':''}`;
  if(dateEl)dateEl.textContent='Semaine du '+weekKey;
  if(banner){banner.style.display='flex';setTimeout(()=>{banner.style.display='none';},6000);}
  updGlobal();renderWeekList();updSelEx();
  showDraftSaved();
}

function resetDay(dk,silent=false){
  // Stop all timers for this day
  Object.keys(TIMERS).filter(k=>k.startsWith(dk+'-')).forEach(k=>{clearInterval(TIMERS[k].interval);delete TIMERS[k];});
  document.querySelectorAll(`#day-${dk} .ex-card`).forEach(c=>c.classList.remove('done'));
  document.querySelectorAll(`#day-${dk} .cb`).forEach(cb=>{cb.classList.remove('checked');cb.style.background='';});
  document.querySelectorAll(`#day-${dk} .drawer`).forEach(d=>d.classList.remove('open'));
  document.querySelectorAll(`#day-${dk} .opts-btn`).forEach(b=>b.textContent='+ Options');
  document.querySelectorAll(`#day-${dk} .sets-body`).forEach(b=>b.innerHTML='');
  const sn=document.getElementById(`seance-note-${dk}`);if(sn)sn.value='';
  const day=DAYS[dk];
  if(day){
    day.exercises.forEach((ex,i)=>{
      const key=`${dk}-${i}`;
      delete SES.seriesCounts[key];delete SES.timeVals[key];delete SES.activeVar[key];delete setRowCt[key];
      document.querySelectorAll(`[id^="vi-${dk}-${i}-"]`).forEach(el=>el.classList.remove('sel'));
      document.querySelectorAll(`[id^="vr-${dk}-${i}-"]`).forEach(el=>el.classList.remove('sel'));
      const ne=document.getElementById(`exn-${dk}-${i}`);if(ne)ne.textContent=ex.name;
      const de=document.getElementById(`exd-${dk}-${i}`);if(de)de.textContent=ex.detail;
      if(ex.type==='time'){
        const te=document.getElementById(`tv-${dk}-${i}`);if(te)te.textContent=ex.dv;
        timerReset(dk,i);
      }
      const nt=document.getElementById(`nt-${dk}-${i}`);if(nt)nt.value='';
    });
    updSeriesTotal(dk);
  }
  updProg(dk);
}

function showDay(dk,btn,color){
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('visible'));
  const panel=document.getElementById('day-'+dk);if(panel)panel.classList.add('visible');

}

// WEEK DASHBOARD
// ═══════════════════════════════════════════════════════════════════
function updWeekDashboard(){
  const now=new Date(),weekKey=wkKey(now);
  const wkStart=new Date(now);const wd=wkStart.getDay();
  wkStart.setDate(wkStart.getDate()-wd+(wd===0?-6:1));
  const wkEnd=new Date(wkStart);wkEnd.setDate(wkStart.getDate()+6);
  const fmt2=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'});
  const pEl=document.getElementById('wkd-period');if(pEl)pEl.textContent=fmt2(wkStart)+' – '+fmt2(wkEnd);
  const dayKeys=['lundi','mardi','mercredi','jeudi','vendredi','samedi','dimanche'];
  const dayColors2={lundi:'#e24b4a',mardi:'#639922',mercredi:'#378add',jeudi:'#ba7517',vendredi:'#7f77dd',samedi:'#888780',dimanche:'#444441'};
  const dayShort={lundi:'Lun',mardi:'Mar',mercredi:'Mer',jeudi:'Jeu',vendredi:'Ven',samedi:'Sam',dimanche:'Dim'};
  const jsToKey=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const todayDk=jsToKey[now.getDay()];
  const sessThisWeek=ST.sessions.filter(s=>s.week===weekKey);
  const doneDays=new Set(sessThisWeek.map(s=>s.day));
  const dDiv=document.getElementById('wkd-days');
  if(dDiv)dDiv.innerHTML=dayKeys.map(dk=>{
    const done=doneDays.has(dk);
    const isToday=dk===todayDk;
    const col=done?dayColors2[dk]:isToday?'#1a1a18':'#e8e8e0';
    const tc=done?'#fff':isToday?'#fff':'#b0b0a8';
    const border=isToday&&!done?'outline:2px solid #1a1a18;outline-offset:2px;':'';
    return `<span class="wk-day-pill" style="background:${col};color:${tc};${border}">${done?'✓ ':isToday?'● ':''} ${dayShort[dk]}</span>`;
  }).join('');
  const weekH=ST.history.filter(h=>h.week===weekKey);
  const totalVol=weekH.reduce((a,h)=>a+h.totalVol,0);
  const wh=weekH.filter(h=>h.type==='weight');
  const maxKg=wh.length?Math.max(...wh.map(h=>h.maxKg)):0;
  const doneEl=document.getElementById('wkd-done');if(doneEl)doneEl.textContent=doneDays.size+'/7';
  const volEl=document.getElementById('wkd-vol');if(volEl)volEl.textContent=fmtN(totalVol)+' kg';
  const topEl=document.getElementById('wkd-top');if(topEl)topEl.textContent=maxKg?maxKg+' kg':'—';
  const vsEl=document.getElementById('wkd-vs');
  const vsCard=document.getElementById('wkd-vs-card');
  if(vsEl){
    const sorted=[...ST.weeks].sort((a,b)=>b.ts-a.ts);
    const prev=sorted.find(s=>s.weekKey!==weekKey);
    if(prev&&prev.totalVol&&totalVol){
      const diff=Math.round(totalVol-prev.totalVol);
      vsEl.textContent=(diff>=0?'+':'')+fmtN(diff)+' kg';
      const isPos=diff>=0;
      if(vsCard){vsCard.style.background=isPos?'#e1f5ee':'#feebeb';}
      vsEl.style.color=isPos?'#0f6e56':'#e24b4a';
    } else {if(vsEl)vsEl.textContent='—';}
  }
}

function buildJourFilter(){

function renderSeances(){
  const div=document.getElementById('seances-list');
  let sessions=[...ST.sessions].sort((a,b)=>b.ts-a.ts);

    div.innerHTML=`<div class="seance-empty">Aucune séance enregistrée${activeJourFilter!=='tous'?' pour ce jour':''} pour le moment.<br>Saisis tes données dans <strong>Séance du jour</strong> et clique sur <strong>Enregistrer la semaine</strong>.</div>`;
    return;
  }
  div.innerHTML=sessions.map((sess,si)=>{
    const allSorted=[...ST.sessions].filter(s=>s.day===sess.day).sort((a,b)=>b.ts-a.ts);
    const siInFiltered=allSorted.findIndex(s=>s.id===sess.id);
    const prevSess=allSorted[siInFiltered+1]||null;
    const totalVol=sess.entries.reduce((a,e)=>a+e.totalVol,0);
    const wh=sess.entries.filter(e=>e.type==='weight');
    const maxKg=wh.length?Math.max(...wh.map(e=>e.maxKg)):0;
    const nbSets=sess.entries.reduce((a,e)=>a+e.sets.length,0);
    return `<div class="seance-card" id="sc-${sess.id}">

          <div class="seance-meta">${sess.date} · sem. ${sess.week}${sess.note?` · <em>"${sess.note}"</em>`:''}</div>
        </div>
        <div class="seance-stats">
          ${maxKg?`<div class="seance-stat"><div class="seance-stat-val">${maxKg} kg</div><div class="seance-stat-lbl">max</div></div>`:''}
          ${totalVol?`<div class="seance-stat"><div class="seance-stat-val">${fmtN(totalVol)}</div><div class="seance-stat-lbl">vol.</div></div>`:''}
          <div class="seance-stat"><div class="seance-stat-val">${nbSets}</div><div class="seance-stat-lbl">séries</div></div>
        </div>
        <div class="seance-chevron" id="chev-${sess.id}">&#9654;</div>
      </div>
      <div class="seance-body" id="sbody-${sess.id}">
        <div class="seance-ex-list">${buildSeanceBody(sess)}</div>
        ${buildCmpBlock(sess,prevSess)}
      </div>
    </div>`;
  }).join('');
}
function togSeance(id){
  const body=document.getElementById(`sbody-${id}`),chev=document.getElementById(`chev-${id}`);
  const open=body.classList.toggle('open');chev.classList.toggle('open',open);
}
function buildSeanceBody(sess){
  if(!sess.entries.length)return '<p class="cmp-none">Aucune donnée enregistrée.</p>';
  return sess.entries.map(e=>{
    const setsHtml=e.type==='weight'?e.sets.map((s,i)=>`<span class="seance-set-pill">${i+1}. ${s.kg} kg × ${s.reps}</span>`).join(''):`<span class="seance-set-pill">${e.value} ${e.unit}</span>`;
    const varHtml=e.variant?`<span style="font-size:10px;background:#e1f5ee;color:#0f6e56;border-radius:6px;padding:1px 6px;font-weight:600;margin-left:4px">variante</span>`:'';
    const noteHtml=e.note?`<div class="seance-ex-note">"${e.note}"</div>`:'';
    return `<div class="seance-ex-row"><div class="seance-ex-name">${e.exName}${varHtml}</div><div class="seance-ex-sets">${setsHtml}${noteHtml}</div></div>`;
  }).join('');
}
function buildCmpBlock(curr,prev){
  if(!prev)return `<div class="cmp-block"><div class="cmp-title">Comparaison séance précédente</div><p class="cmp-none">Première séance enregistrée pour ce jour — la comparaison apparaîtra dès la prochaine.</p></div>`;
  const rows=curr.entries.map(ce=>{
    const pe=prev.entries.find(e=>e.exId===ce.exId);
    if(ce.type==='time'){
      const cv=ce.value,pv=pe?pe.value:null,unit=ce.unit||'';
      const delta=pv!==null?cv-pv:null;
      const dH=delta===null?`<span class="cmp-new">nouveau</span>`:delta>0?`<span class="cmp-delta cmp-up">+${delta}${unit}</span>`:delta<0?`<span class="cmp-delta cmp-dn">${delta}${unit}</span>`:`<span class="cmp-delta cmp-eq">=</span>`;
      return `<div class="cmp-row"><div class="cmp-ex">${ce.exName}</div><div class="cmp-prev">${pv!==null?pv+' '+unit:'—'}</div><div class="cmp-curr">${cv} ${unit}</div>${dH}</div>`;
    }
    const dm=pe?Math.round((ce.maxKg-pe.maxKg)*10)/10:null;
    const dv=pe?Math.round(ce.totalVol-pe.totalVol):null;
    const kgD=dm===null?`<span class="cmp-new">nouveau</span>`:dm>0?`<span class="cmp-delta cmp-up">+${dm} kg</span>`:dm<0?`<span class="cmp-delta cmp-dn">${dm} kg</span>`:`<span class="cmp-delta cmp-eq">=</span>`;
    const vS=dv!==null?(dv>0?`<span class="trend-up"> +${dv} kg vol.</span>`:dv<0?`<span class="trend-dn"> ${dv} kg vol.</span>`:''):'';
    return `<div class="cmp-row"><div class="cmp-ex">${ce.exName}</div><div class="cmp-prev">${pe?pe.maxKg+' kg · '+pe.sets.length+' sér.':'—'}</div><div class="cmp-curr">${ce.maxKg} kg · ${ce.sets.length} sér.${vS}</div>${kgD}</div>`;
  }).join('');
  const dVol=Math.round(curr.entries.reduce((a,e)=>a+e.totalVol,0)-prev.entries.reduce((a,e)=>a+e.totalVol,0));
  const dVolH=dVol>0?`<span class="trend-up">+${fmtN(dVol)} kg</span>`:dVol<0?`<span class="trend-dn">${fmtN(dVol)} kg</span>`:`<span style="color:#888">volume égal</span>`;
  return `<div class="cmp-block">
    <div class="cmp-title">vs ${prev.date} — volume total : ${dVolH}</div>
    <div style="display:grid;grid-template-columns:120px 1fr 1fr 56px;gap:2px 6px;margin-bottom:5px">
      <span style="font-size:10px;font-weight:700;color:#888">Exercice</span>
      <span style="font-size:10px;font-weight:700;color:#888">Séance préc.</span>
      <span style="font-size:10px;font-weight:700;color:#888">Aujourd'hui</span>
      <span style="font-size:10px;font-weight:700;color:#888;text-align:right">Δ</span>
    </div>${rows}
  </div>`;
}

  const smtr=document.getElementById('s-max-tr'),svtr=document.getElementById('s-vol-tr');

  const labels=filtered.map(h=>h.date),d1=isTime?filtered.map(h=>h.value):filtered.map(h=>h.maxKg),d2=isTime?null:filtered.map(h=>Math.round(h.totalVol));
  const datasets=[{label:isTime?'Durée':'Charge max',data:d1,borderColor:'#378add',backgroundColor:'rgba(55,138,221,0.07)',tension:0.3,pointRadius:4,pointBackgroundColor:'#378add',borderDash:[]}];
  if(d2)datasets.push({label:'Volume (kg)',data:d2,borderColor:'#7f77dd',backgroundColor:'rgba(127,119,221,0.07)',tension:0.3,pointRadius:4,pointBackgroundColor:'#7f77dd',borderDash:[4,3],yAxisID:'y2'});
  if(chartInst)chartInst.destroy();
  const scalesObj={x:{ticks:{font:{size:11},maxRotation:45,autoSkip:labels.length>8},grid:{color:'rgba(0,0,0,0.05)'}},y:{grid:{color:'rgba(0,0,0,0.05)'}}};
  if(d2)scalesObj.y2={position:'right',grid:{drawOnChartArea:false}};
  chartInst=new Chart(canvas,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:scalesObj}});
  const clEl=document.getElementById('chart-legend');
  if(clEl)clEl.innerHTML=`<span><span class="ldot" style="background:#378add"></span>${isTime?'Durée':'Charge max'}</span>${d2?'<span><span class="ldot" style="background:#7f77dd"></span>Volume</span>':''}`;
  if(hdiv)hdiv.innerHTML=`<p class="sec-title">Historique détaillé</p>
  <table class="htable"><thead><tr><th>Date</th><th>Semaine</th><th>${isTime?'Durée':'Charge max'}</th>${d2?'<th>Volume</th>':''}<th>Séries</th></tr></thead><tbody>
  ${[...filtered].reverse().slice(0,20).map(h=>`<tr><td>${h.date}</td><td style="font-size:11px;color:#6b6b66">${h.week||'—'}</td><td><strong>${isTime?(h.value+' '+(h.unit||'')):(h.maxKg+' kg')}</strong></td>${d2?`<td>${Math.round(h.totalVol)} kg</td>`:''}<td>${h.sets.length}</td></tr>`).join('')}
  </tbody></table>`;
}
function renderWeekList(){
  const div=document.getElementById('week-list-div');if(!div)return;
  if(!ST.weeks.length){div.innerHTML='';return;}
  const sorted=[...ST.weeks].sort((a,b)=>b.ts-a.ts).slice(0,8);
  div.innerHTML=`<p class="sec-title" style="margin-top:1rem">Semaines enregistrées</p>`+sorted.map(s=>`<div class="wk-item"><div><div class="wk-item-label">Semaine du ${s.weekKey}</div><div class="wk-item-sub">Enregistré le ${s.savedAt} · ${s.entries} entrées</div></div><div style="font-size:13px;font-weight:700;color:#0f6e56">${s.totalVol?fmtN(s.totalVol)+' kg':''}</div></div>`).join('');
}
function setPeriod(p,btn){suiviPeriod=p;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderSuivi();}

// ═══════════════════════════════════════════════════════════════════
// PARAMÈTRES — BUG FIX: buildParams uses getDs which reads ST.customDs
// (already initialized at top of script before any call)
// ═══════════════════════════════════════════════════════════════════
function buildParams(){
  const cont=document.getElementById('params-container');if(!cont)return;
  let h=`<div class="export-section">
    <h3>Sauvegarde des données</h3>
    <p>Exporte tes données pour les sauvegarder ou les transférer sur un autre appareil. Importe un fichier JSON exporté précédemment.</p>
    <button class="export-btn green" onclick="exportData()">&#8659; Exporter JSON</button>
    <button class="export-btn outline" onclick="toggleImportArea()">&#8657; Importer JSON</button>
    <div id="import-area-wrap" style="display:none;margin-top:8px">
      <textarea class="import-area" id="import-ta" placeholder="Colle ton JSON exporté ici..."></textarea>
      <button class="export-btn green" style="margin-top:6px" onclick="importData()">Valider l'import</button>
      <span id="import-msg" style="font-size:12px;color:#0f6e56;margin-left:8px;display:none"></span>
    </div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #e8e8e0">
      <button class="export-btn outline" style="color:#e24b4a;border-color:#e24b4a" onclick="clearAllData()">&#9888; Effacer toutes les données</button>
      <button class="export-btn outline" onclick="diagStorage()" style="margin-top:4px">&#128269; Diagnostic stockage</button>
      <p style="font-size:11px;color:#a0a09a;margin-top:5px">Cette action est irréversible. Exporte d'abord tes données.</p>
      <div id="diag-output" style="display:none;margin-top:8px;padding:8px 10px;background:#f0efe8;border-radius:8px;font-size:12px;color:#1a1a18;font-family:monospace;word-break:break-all"></div>
    </div>
  </div>
  <p class="sec-title">Séries cibles par exercice</p>
  <p style="font-size:12px;color:#6b6b66;margin-bottom:0.85rem;line-height:1.5">Modifie le nombre de séries par défaut. Les changements s'appliquent immédiatement à la séance du jour.</p>`;
  Object.entries(DAYS).forEach(([dk,day])=>{
    h+=`<div class="params-day-block">
      <div class="params-day-title"><div class="params-day-dot" style="background:${day.color}"></div><span style="font-size:13px;font-weight:700;color:#1a1a18">${day.label}</span></div>`;
    day.exercises.forEach(ex=>{
      const cur=getDs(ex);  // reads ST.customDs safely (initialized at top)
      const isModified=ST.customDs[ex.id]!==undefined;
      h+=`<div class="params-ex-row">
        <div style="flex:1;min-width:0"><div class="params-ex-name">${ex.name}</div><div class="params-ex-detail">${ex.detail}</div></div>
        <div class="params-series-ctrl">
          <span class="ps-lbl">Séries</span>
          <button class="ps-btn" onclick="adjDs('${ex.id}',${ex.ds},-1)">−</button>
          <span class="ps-val" id="psd-${ex.id}">${cur}</span>
          <button class="ps-btn" onclick="adjDs('${ex.id}',${ex.ds},1)">+</button>
          ${isModified?`<span class="ps-modified">modifié</span><button class="params-reset-btn" onclick="resetDs('${ex.id}')">Défaut</button>`:''}
        </div>
      </div>`;
    });
    h+='</div>';
  });
  cont.innerHTML=h;
}

function adjDs(exId,defaultDs,delta){
  const cur=ST.customDs[exId]!==undefined?ST.customDs[exId]:defaultDs;
  const nv=Math.max(1,cur+delta);
  ST.customDs[exId]=nv;
  svStore();
  // Update params panel display
  buildParams();
  // Update labels in-place on every day panel — without destroying existing inputs
  Object.entries(DAYS).forEach(([dk,day])=>{
    day.exercises.forEach((ex,idx)=>{
      if(ex.id!==exId)return;
      const ds=getDs(ex);
      // Update the subtitle detail line if not currently overridden by a saveSets result
      const deEl=document.getElementById(`exd-${dk}-${idx}`);
      if(deEl){
        const txt=deEl.textContent;
        // Only update if it still shows the original programme detail (not a "X kg max" result)
        const isOriginal=!txt.includes('kg max')&&!txt.includes('Poids corps')&&!txt.includes('×');
        if(isOriginal){
          // Rebuild the detail string with new series count
          const base=ex.detail.replace(/^\d+/,String(ds));
          deEl.textContent=base;
        }
      }
      // Always update the total series counter
      updSeriesTotal(dk);
    });
  });
  updGlobal();
}

function resetDs(exId){
  delete ST.customDs[exId];
  svStore();
  buildParams();
  Object.entries(DAYS).forEach(([dk,day])=>{
    day.exercises.forEach((ex,idx)=>{
      if(ex.id!==exId)return;
      const deEl=document.getElementById(`exd-${dk}-${idx}`);
      if(deEl){
        const txt=deEl.textContent;
        const isOriginal=!txt.includes('kg max')&&!txt.includes('Poids corps')&&!txt.includes('×');
        if(isOriginal)deEl.textContent=ex.detail;
      }
      updSeriesTotal(dk);
    });
  });
  updGlobal();
}

function clearAllData(){
  if(!confirm('Effacer toutes les données ? Cette action est irréversible.'))return;

  // ── 1. Vider localStorage complètement ──────────────────────────
  try{
    // Supprimer toutes les clés fit_*
    const allKeys=[];
    for(let i=0;i<localStorage.length;i++) allKeys.push(localStorage.key(i));
    allKeys.filter(k=>k&&k.startsWith('fit_')).forEach(k=>localStorage.removeItem(k));
    // Écraser explicitement avec objet vide
    localStorage.setItem(SK,'{"history":[],"weeks":[],"sessions":[],"customDs":{},"draft":{}}');
  }catch(e){console.warn('localStorage error:',e);}

  // ── 2. Réinitialiser la variable ST en mémoire ───────────────────
  ST.history=[];
  ST.weeks=[];
  ST.sessions=[];
  ST.customDs={};
  ST.draft={};

  // ── 3. Réinitialiser l'état de session en mémoire ────────────────
  Object.keys(SES.seriesCounts).forEach(k=>delete SES.seriesCounts[k]);
  Object.keys(SES.timeVals).forEach(k=>delete SES.timeVals[k]);
  Object.keys(SES.activeVar).forEach(k=>delete SES.activeVar[k]);
  Object.keys(setRowCt).forEach(k=>delete setRowCt[k]);
  Object.keys(TIMERS).forEach(k=>{try{clearInterval(TIMERS[k].interval);}catch(e){}delete TIMERS[k];});

  // ── 4. Reconstruire l'interface complète ─────────────────────────
  // Séance du jour
  buildAll();
  const _dayOrder=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  const _dayColors=['#444441','#e24b4a','#639922','#378add','#ba7517','#7f77dd','#888780'];
  const _ti=new Date().getDay();
  const _tabs=document.querySelectorAll('.dtab');
  if(_tabs[_ti])showDay(_dayOrder[_ti],_tabs[_ti],_dayColors[_ti]);

  // Mes séances — forcer le rendu vide
  buildJourFilter();
  activeJourFilter='tous';
  document.getElementById('seances-list').innerHTML=
    '<div class="seance-empty">Aucune séance enregistrée pour le moment.<br>Saisis tes données dans <strong>Séance du jour</strong> et clique sur <strong>Enregistrer la semaine</strong>.</div>';

  // Suivi progression — forcer le rendu vide
  if(chartInst){chartInst.destroy();chartInst=null;}
  const _hdiv=document.getElementById('history-div');if(_hdiv)_hdiv.innerHTML='';
  const _lDiv=document.getElementById('chart-legend');if(_lDiv)_lDiv.innerHTML='';
  const _smDiv=document.getElementById('suivi-metrics');if(_smDiv)_smDiv.style.display='none';
  const _exSel=document.getElementById('ex-sel');
  if(_exSel)_exSel.innerHTML='<option value="">-- Choisir un exercice --</option>';
  const _wkList=document.getElementById('week-list-div');if(_wkList)_wkList.innerHTML='';

  // Paramètres
  buildParams();

  // Métriques globales
  updGlobal();
  showDraftSaved();

  // ── 5. Vérification et confirmation ─────────────────────────────
  const _check=JSON.parse(localStorage.getItem(SK)||'{}');
  const _ok=(!_check.history||_check.history.length===0)&&(!_check.sessions||_check.sessions.length===0);
  if(_ok){
    alert('✓ Toutes les données ont été effacées avec succès.');
  } else {
    alert('⚠ Effacement partiel détecté. Ferme le fichier, rouvre-le et réessaie.');
  }
}

function diagStorage(){
  const out=document.getElementById('diag-output');if(!out)return;
  out.style.display='block';
  try{
    const raw=localStorage.getItem(SK);
    if(!raw){out.innerHTML='<strong>Clé '+SK+' : absente</strong> (localStorage vide)';return;}
    const data=JSON.parse(raw);
    const lines=[
      '<strong>Clé : '+SK+'</strong>',
      'history : '+data.history?.length+' entrées',
      'sessions : '+data.sessions?.length+' séances',
      'weeks : '+data.weeks?.length+' semaines',
      'customDs : '+Object.keys(data.customDs||{}).length+' modifs',
      '---',
      'ST en mémoire : history='+ST.history.length+' sessions='+ST.sessions.length
    ];
    out.innerHTML=lines.join('<br>');
  }catch(e){out.innerHTML='Erreur lecture localStorage : '+e.message;}
}

function exportData(){
  const blob=new Blob([JSON.stringify(ST,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  a.download='fitness_data_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function toggleImportArea(){
  const w=document.getElementById('import-area-wrap');
  if(w)w.style.display=w.style.display==='none'?'block':'none';
}
function importData(){
  const ta=document.getElementById('import-ta');if(!ta)return;
  try{
    const data=JSON.parse(ta.value);
    if(!data.history||!data.weeks)throw new Error('Format invalide — fichier corrompu ou incomplet');
    ST=data;
    if(!ST.customDs)ST.customDs={};
    if(!ST.sessions)ST.sessions=[];
    if(!ST.draft)ST.draft={};
    svStore();
    const msg=document.getElementById('import-msg');
    if(msg){msg.textContent='✓ Import réussi !';msg.style.display='inline';setTimeout(()=>{msg.style.display='none';},3000);}
    updGlobal();buildParams();buildAll();
    const dayOrder2=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    const dayColors2=['#444441','#e24b4a','#639922','#378add','#ba7517','#7f77dd','#888780'];
    const todayIdx2=new Date().getDay();
    const tabs=document.querySelectorAll('.dtab');
    if(tabs[todayIdx2])showDay(dayOrder2[todayIdx2],tabs[todayIdx2],dayColors2[todayIdx2]);
  }catch(e){alert('Erreur import : '+e.message);}
}

function showMain(view,btn){
  document.querySelectorAll('.main-view').forEach(v=>v.classList.remove('on'));
  document.getElementById('main-'+view).classList.add('on');
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  const fw=document.getElementById('fixed-save-wrap');
  if(fw)fw.style.display=view==='seance'?'block':'none';
  if(view==='suivi'){updSelEx();updGlobal();renderSuivi();renderWeekList();}
  if(view==='seances-hist'){buildJourFilter();renderSeances();}
  if(view==='params'){buildParams();}
}
